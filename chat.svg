<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="700" height="320">
  <style>
    .bubble {
      fill: #2d2d2d;
      rx: 18;
    }
    .bubble-light {
      fill: #3a3a3a;
    }
    .text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      fill: #ffffff;
    }
    .label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #aaaaaa;
    }

    /* Bubble 1 */
    #b1 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 0.5s; }
    /* Bubble 2 */
    #b2 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 2s; }
    /* Typing dots before bubble 2 */
    #typing1 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 0.9s; }
    /* Bubble 3 */
    #b3 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 4s; }
    /* Typing dots before bubble 3 */
    #typing2 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 2.5s; }
    /* Bubble 4 - interests */
    #b4 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 6s; }
    /* Typing dots before bubble 4 */
    #typing3 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 4.5s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes showHide {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Dot bounce */
    .dot { animation: bounce 1s infinite ease-in-out; fill: #aaaaaa; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }
  </style>

  <!-- Name label top -->
  <text x="24" y="28" class="label">Hardik Kaurani</text>

  <!-- Bubble 1: Hi, I'm Hardik -->
  <g id="b1">
    <rect x="16" y="38" width="200" height="44" rx="18" fill="#2d2d2d"/>
    <text x="36" y="66" class="text">Hi, I'm Hardik 👋</text>
  </g>

  <!-- Typing indicator 1 -->
  <g id="typing1">
    <rect x="16" y="92" width="64" height="36" rx="18" fill="#2d2d2d"/>
    <circle class="dot" cx="36" cy="110" r="4"/>
    <circle class="dot" cx="48" cy="110" r="4"/>
    <circle class="dot" cx="60" cy="110" r="4"/>
  </g>

  <!-- Bubble 2: Open source contributor -->
  <g id="b2">
    <rect x="16" y="92" width="360" height="44" rx="18" fill="#2d2d2d"/>
    <text x="36" y="120" class="text">Contributing to open-source projects</text>
  </g>

  <!-- Typing indicator 2 -->
  <g id="typing2">
    <rect x="16" y="146" width="64" height="36" rx="18" fill="#2d2d2d"/>
    <circle class="dot" cx="36" cy="164" r="4"/>
    <circle class="dot" cx="48" cy="164" r="4"/>
    <circle class="dot" cx="60" cy="164" r="4"/>
  </g>

  <!-- Bubble 3: Currently working on -->
  <g id="b3">
    <rect x="16" y="146" width="560" height="62" rx="18" fill="#2d2d2d"/>
    <text x="36" y="172" class="text">Currently working on · AI-native systems</text>
    <text x="36" y="196" class="text">· autonomous agents · LLM infra</text>
  </g>

  <!-- Typing indicator 3 -->
  <g id="typing3">
    <rect x="16" y="218" width="64" height="36" rx="18" fill="#2d2d2d"/>
    <circle class="dot" cx="36" cy="236" r="4"/>
    <circle class="dot" cx="48" cy="236" r="4"/>
    <circle class="dot" cx="60" cy="236" r="4"/>
  </g>

  <!-- Bubble 4: Interests -->
  <g id="b4">
    <rect x="16" y="218" width="630" height="62" rx="18" fill="#2d2d2d"/>
    <text x="36" y="244" class="text">Quantum · Quantics · Architectonics · Execution · Art</text>
    <text x="36" y="268" class="text">GeoSense · Noetics · Momentum · Aesthetics</text>
  </g>

</svg>
