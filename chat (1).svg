<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260">
  <style>
    .small {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      fill: #cccccc;
    }
    .label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #aaaaaa;
    }

    #b1 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 0.5s; }
    #t1 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 0.9s; }
    #b2 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 2.2s; }
    #t2 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 2.7s; }
    #b3 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 4.0s; }
    #t3 { opacity: 0; animation: showHide 1.2s ease forwards; animation-delay: 4.5s; }
    #b4 { opacity: 0; animation: fadeIn 0.4s ease forwards; animation-delay: 5.8s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes showHide {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .dot { animation: bounce 1s infinite ease-in-out; fill: #aaaaaa; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-4px); }
    }
  </style>

  <!-- Label -->
  <text x="20" y="24" class="label">Hardik Kaurani</text>

  <!-- Bubble 1: Hi I'm Hardik -->
  <g id="b1">
    <rect x="16" y="34" width="175" height="38" rx="16" fill="#2d2d2d"/>
    <text x="34" y="58" class="small">Hi, I'm Hardik 👋</text>
  </g>

  <!-- Typing 1 -->
  <g id="t1">
    <rect x="16" y="82" width="58" height="32" rx="16" fill="#2d2d2d"/>
    <circle class="dot" cx="34" cy="98" r="3.5"/>
    <circle class="dot" cx="45" cy="98" r="3.5"/>
    <circle class="dot" cx="56" cy="98" r="3.5"/>
  </g>

  <!-- Bubble 2: Contributing -->
  <g id="b2">
    <rect x="16" y="82" width="278" height="38" rx="16" fill="#2d2d2d"/>
    <text x="34" y="106" class="small">Contributing to Open-Source projects</text>
  </g>

  <!-- Typing 2 -->
  <g id="t2">
    <rect x="16" y="130" width="58" height="32" rx="16" fill="#2d2d2d"/>
    <circle class="dot" cx="34" cy="146" r="3.5"/>
    <circle class="dot" cx="45" cy="146" r="3.5"/>
    <circle class="dot" cx="56" cy="146" r="3.5"/>
  </g>

  <!-- Bubble 3: Currently working on -->
  <g id="b3">
    <rect x="16" y="130" width="560" height="38" rx="16" fill="#2d2d2d"/>
    <text x="34" y="154" class="small">Currently working on · AI-native systems · autonomous agents · LLM infra</text>
  </g>

  <!-- Typing 3 -->
  <g id="t3">
    <rect x="16" y="178" width="58" height="32" rx="16" fill="#2d2d2d"/>
    <circle class="dot" cx="34" cy="194" r="3.5"/>
    <circle class="dot" cx="45" cy="194" r="3.5"/>
    <circle class="dot" cx="56" cy="194" r="3.5"/>
  </g>

  <!-- Bubble 4: Interests -->
  <g id="b4">
    <rect x="16" y="178" width="620" height="38" rx="16" fill="#2d2d2d"/>
    <text x="34" y="202" class="small">Quantum · Quantics · Architectonics · Execution · Art · GeoSense · Noetics · Momentum · Aesthetics</text>
  </g>

</svg>
